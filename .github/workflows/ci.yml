name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_DEFAULT: "3.12"
  RUST_TOOLCHAIN: "stable"

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest jasusi_cli/tests/ \
            -v --tb=short \
            --timeout=60 \
            -x
        env:
          JASUSI_TEST_MODE: "1"

      - name: mypy strict
        run: |
          python -m mypy jasusi_cli/ \
            --strict \
            --ignore-missing-imports

  rust-check:
    name: Rust cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - name: cargo check
        run: cargo check --workspace --manifest-path rust/Cargo.toml

      - name: clippy
        run: cargo clippy --workspace --manifest-path rust/Cargo.toml -- -D warnings

  smoke-tests:
    name: Smoke tests (no API key)
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: "pip"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: jasusi --version
        run: jasusi --version

      - name: jasusi status
        run: jasusi status

      - name: pip install smoke test
        run: python -c "import jasusi_cli; print(jasusi_cli.__version__)"
